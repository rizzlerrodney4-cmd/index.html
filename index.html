<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rodney Hub</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: black;
  color: #00ffcc;
  overflow: hidden;
}

/* LOADING SCREEN */
#loading {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* FAKE TERMINAL TEXT */
#terminal {
  font-size: 14px;
  white-space: pre-line;
  text-align: left;
  max-width: 90%;
}

/* MAIN CONTENT */
#main {
  display: none;
  text-align: center;
  padding-top: 50px;
}

.btn {
  display: block;
  margin: 15px auto;
  padding: 15px;
  width: 80%;
  max-width: 300px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  font-size: 16px;
  box-shadow: 0 0 10px #00ffcc;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px #00ffcc;
}

.messenger { background: #0084ff; }
.email { background: #ff4d4d; }
.whatsapp { background: #25D366; }

.counter {
  margin-top: 20px;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- LOADING SCREEN -->
<div id="loading">
  <div id="terminal"></div>
</div>

<!-- MAIN PAGE -->
<div id="main">
  <h1>CONTACT HUB</h1>

  <a class="btn messenger" onclick="countClick()" href="https://www.facebook.com/messages/t/61576524388459">
    💬 Facebook
  </a>

  <a class="btn email" onclick="countClick()" href="mailto:rizzlerrodney4@gmail.com">
    📩 Email
  </a>

  <a class="btn whatsapp" onclick="countClick()" href="https://wa.me/254717578454">
    📱 WhatsApp
  </a>

  <div class="counter">
    🔥 Total Clicks: <span id="clicks">0</span>
  </div>
</div>

<script>
/* FAKE HACKER TEXT */
const lines = [
  "Initializing system...",
  "Bypassing firewall...",
  "Connecting to secure server...",
  "Access granted...",
  "Loading contact interface..."
];

let i = 0;
const terminal = document.getElementById("terminal");

function typeLine() {
  if (i < lines.length) {
    terminal.innerHTML += lines[i] + "\\n";
    i++;
    setTimeout(typeLine, 700);
  } else {
    setTimeout(showMain, 1000);
  }
}

function showMain() {
  document.getElementById("loading").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.body.style.overflow = "auto";
}

typeLine();

/* CLICK COUNTER (LOCAL STORAGE) */
let clicks = localStorage.getItem("clicks") || 0;
document.getElementById("clicks").innerText = clicks;

function countClick() {
  clicks++;
  localStorage.setItem("clicks", clicks);
  document.getElementById("clicks").innerText = clicks;
}
</script>

</body>
</html>
